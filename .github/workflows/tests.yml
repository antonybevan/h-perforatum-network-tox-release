name: Release gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      full_pipeline:
        description: "Run the full 22-step pipeline"
        required: false
        default: false
        type: boolean

jobs:
  release-gates:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: requirements-lock.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-lock.txt
    
    - name: Verify manuscript numbers and claims
      run: |
        python verify_numbers.py

    - name: Run unit tests
      run: |
        python -m pytest -q

    - name: Check data checksums
      run: |
        sha256sum -c data/CHECKSUMS.sha256

    - name: Validate processed data integrity
      run: |
        python scripts/validate_data_integrity.py

    - name: Rebuild reviewer evidence checks
      run: |
        python REVIEWER_EVIDENCE.py
        python GUNEY_FIDELITY_check.py

    - name: Run full pipeline
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_pipeline }}
      run: |
        python scripts/run_pipeline.py
